name: PR Slim CI

on:
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  actions: read

jobs:
  slim-ci:
    name: Build modified with defer to prod artifact 
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT:  "${{ secrets.SNOWFLAKE_ACCOUNT }}"
      SNOWFLAKE_USER:     "${{ secrets.SNOWFLAKE_USER }}"
      SNOWFLAKE_PASSWORD: "${{ secrets.SNOWFLAKE_PASSWORD }}"
    
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.12
      - run: uv sync

      - name: Set DBT_ENV_NAME from branch (uppercase, _ for / and -)
        run: |
          NAME="${{ github.head_ref }}"
          SANITIZED=$(echo "$NAME" | tr '/' '_' | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          echo "DBT_ENV_NAME=$SANITIZED" >> "$GITHUB_ENV"
          echo "PR will build into schema: DBT_$SANITIZED"
      - run: cd airbnb && uv run dbt deps --target dev

      - name: Download latest prod-target artifact from main
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: prod-build.yml
          branch: main
          name: prod-target
          path: airbnb/prod-target
          if_no_artifact_found: fail

      - name: dbt build (slim CI if manifest available, else full)
        run: |
          cd airbnb
          uv run dbt build --target dev --select state:modified+ --defer --state ./prod-target