name: Prod deploy (on merge to main / manual)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Production deps and build
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT:  "${{ secrets.SNOWFLAKE_ACCOUNT }}"
      SNOWFLAKE_USER:     "${{ secrets.SNOWFLAKE_USER }}"
      SNOWFLAKE_PASSWORD: "${{ secrets.SNOWFLAKE_PASSWORD }}"
    
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
    
      - run: uv python install 3.12
      - run: uv sync
      - run: cd airbnb && uv run dbt deps --target prod
      - run: cd airbnb && uv run dbt build --target prod
      - name: Upload prod target as artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-target
          path: airbnb/target/
          retention-days: 90        
