sources:
    - name: raw
      database: airbnb 
      schema: raw 
      tables:
      - name: listings
        identifier: listings
        columns:
          - name: id
            data_tests:
              - not_null
              - unique
        
      - name: reviews
        identifier: reviews
        columns:
          - name: listing_id
            data_tests:
              - not_null

        # config:
        #  loaded_at_field: date
        #  freshness:
        #    warn_after: {count: 12, period: hour}
        #    error_after: {count: 24, period: hour}

      - name: hosts
        identifier: hosts
        columns:
          - name: id
            data_tests:
              - not_null
              - unique