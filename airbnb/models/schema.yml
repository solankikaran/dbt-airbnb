models:
  - name: dim_hosts_cleansed
    description: Cleansed table for airbnb hosts.
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        description: The id of the host. This is the primary key
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique

      - name: host_name
        description: The name of the host
        data_type: string
        constraints:
          - type: not_null
      
      - name: is_superhost
        description: Defines whether the hosts is a superhost.
        data_type: boolean
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: updated_at
        data_type: timestamp

      - name: created_at
        data_type: timestamp

  - name: dim_listings_cleansed
    description: Cleansed listing table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          config:
            severity: error

    columns:
      - name: listing_id
        description: Primary key for listing
        data_tests:
          - not_null
          - unique

      - name: host_id
        description: The host's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: Type of the room/apartment
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']
        
      - name: minimum_nights
        description: '{{ doc("dim_listings_cleansed_minimum_nights") }}'
        data_tests:
          - positive_values