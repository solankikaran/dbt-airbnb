unit_tests:
  - name: unit_test_full_moon_matcher
    model: mart_fullmoon_reviews
    given:
      - input: ref('fct_reviews')
        rows:
         - {review_date: '2025-01-13'}
         - {review_date: '2025-01-14'}
         - {review_date: '2025-01-15'}
      
      - input: ref('seed_full_moon_dates')
        rows:
          - {full_moon_date: '2025-01-14'}
    expect:
      rows:
        - {review_date: '2025-01-13', is_full_moon: 'not_full_moon'}
        - {review_date: '2025-01-14', is_full_moon: 'not_full_moon'}
        - {review_date: '2025-01-15', is_full_moon: 'full_moon'}